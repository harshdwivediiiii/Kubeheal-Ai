version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: kubeheal-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kubeheal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kubeheal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: kubeheal-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      REDIS_HOST: redis
      ENVIRONMENT: production
      SECRET_KEY: ${SECRET_KEY:-change-in-production}
    volumes:
      - backend_logs:/app/logs
      - ./artifacts:/app/artifacts
      - ~/.kube/config:/home/appuser/.kube/config:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dashboard
    container_name: kubeheal-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501')"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: kubeheal-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: kubeheal-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ../configs/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../configs/grafana/datasources:/etc/grafana/provisioning/datasources

  ai-analyzer:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai-analyzer
    container_name: kubeheal-ai
    restart: unless-stopped
    ports:
      - "8002:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MODELS_DIR: /app/artifacts/models
    volumes:
      - backend_logs:/app/logs
      - ./artifacts:/app/artifacts
    depends_on:
      - mongodb

volumes:
  mongodb_data:
  redis_data:
  backend_logs:
  prometheus_data:
  grafana_data:
