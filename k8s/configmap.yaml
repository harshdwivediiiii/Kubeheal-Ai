apiVersion: v1
kind: ConfigMap
metadata:
  name: kubeheal-config
  namespace: kubeheal
data:
  config.yaml: |
    project:
      name: KubeHeal AI
      environment: production
    api:
      host: 0.0.0.0
      port: 8000
      workers: 4
    monitoring:
      prometheus_url: http://prometheus.monitoring:9090
    ml:
      models_dir: /app/artifacts/models
    logging:
      level: INFO
