apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubeheal-network-policy
  namespace: kubeheal
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kubeheal
      ports:
        - protocol: TCP
          port: 8000
        - protocol: TCP
          port: 8501
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443
        - protocol: TCP
          port: 80
