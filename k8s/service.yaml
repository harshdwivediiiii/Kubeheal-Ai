apiVersion: v1
kind: Service
metadata:
  name: kubeheal-backend
  namespace: kubeheal
  labels:
    app: kubeheal
    component: backend
spec:
  selector:
    app: kubeheal
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: kubeheal-dashboard
  namespace: kubeheal
  labels:
    app: kubeheal
    component: dashboard
spec:
  selector:
    app: kubeheal
    component: dashboard
  ports:
    - port: 8501
      targetPort: 8501
      name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: kubeheal-ai-analyzer
  namespace: kubeheal
  labels:
    app: kubeheal
    component: ai-analyzer
spec:
  selector:
    app: kubeheal
    component: ai-analyzer
  ports:
    - port: 8000
      targetPort: 8000
      name: http
  type: ClusterIP
