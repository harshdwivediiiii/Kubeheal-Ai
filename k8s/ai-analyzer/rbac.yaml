# ServiceAccount for the analyzer pod
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubeheal-analyzer
  namespace: default
---
# Grant permission to read pods and pod logs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubeheal-analyzer-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubeheal-analyzer-binding
subjects:
  - kind: ServiceAccount
    name: kubeheal-analyzer
    namespace: default
roleRef:
  kind: ClusterRole
  name: kubeheal-analyzer-role
  apiGroup: rbac.authorization.k8s.io
