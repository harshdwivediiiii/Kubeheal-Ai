apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeheal-backend
  namespace: kubeheal
  labels:
    app: kubeheal
    component: backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: kubeheal
      component: backend
  template:
    metadata:
      labels:
        app: kubeheal
        component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
    spec:
      serviceAccountName: kubeheal-backend
      containers:
        - name: backend
          image: harshdwivediiiii/kubeheal-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: kubeheal-secrets
                  key: mongodb-uri
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: kubeheal-secrets
                  key: secret-key
            - name: ENVIRONMENT
              value: "production"
            - name: REDIS_HOST
              value: "kubeheal-redis"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /liveness
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readiness
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: kubeconfig
              mountPath: /home/appuser/.kube
              readOnly: true
      volumes:
        - name: kubeconfig
          secret:
            secretName: kubeheal-kubeconfig
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeheal-dashboard
  namespace: kubeheal
  labels:
    app: kubeheal
    component: dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeheal
      component: dashboard
  template:
    metadata:
      labels:
        app: kubeheal
        component: dashboard
    spec:
      containers:
        - name: dashboard
          image: harshdwivediiiii/kubeheal-dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: API_URL
              value: "http://kubeheal-backend:8000"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeheal-ai-analyzer
  namespace: kubeheal
  labels:
    app: kubeheal
    component: ai-analyzer
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeheal
      component: ai-analyzer
  template:
    metadata:
      labels:
        app: kubeheal
        component: ai-analyzer
    spec:
      serviceAccountName: kubeheal-ai-analyzer
      containers:
        - name: ai-analyzer
          image: harshdwivediiiii/kubeheal-ai-analyzer:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: kubeheal-secrets
                  key: mongodb-uri
            - name: MODELS_DIR
              value: /app/artifacts/models
          resources:
            requests:
              cpu: "1000m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
