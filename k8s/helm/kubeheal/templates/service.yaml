apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeheal.fullname" . }}-backend
  labels:
    {{- include "kubeheal.labels" . | nindent 4 }}
    component: backend
spec:
  selector:
    {{- include "kubeheal.selectorLabels" . | nindent 4 }}
    component: backend
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeheal.fullname" . }}-dashboard
  labels:
    {{- include "kubeheal.labels" . | nindent 4 }}
    component: dashboard
spec:
  selector:
    {{- include "kubeheal.selectorLabels" . | nindent 4 }}
    component: dashboard
  ports:
    - port: {{ .Values.dashboard.service.port }}
      targetPort: {{ .Values.dashboard.service.port }}
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "kubeheal.fullname" . }}-ai-analyzer
  labels:
    {{- include "kubeheal.labels" . | nindent 4 }}
    component: ai-analyzer
spec:
  selector:
    {{- include "kubeheal.selectorLabels" . | nindent 4 }}
    component: ai-analyzer
  ports:
    - port: {{ .Values.aiAnalyzer.service.port }}
      targetPort: {{ .Values.aiAnalyzer.service.port }}
  type: ClusterIP
