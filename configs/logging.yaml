version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  detailed:
    format: "%(asctime)s [%(levelname)s] %(name)s:%(lineno)d - %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: logs/kubeheal.log
    maxBytes: 10485760
    backupCount: 5

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: logs/error.log
    maxBytes: 10485760
    backupCount: 3

loggers:
  uvicorn:
    handlers: [console]
    level: INFO
    propagate: false

  fastapi:
    handlers: [console, file]
    level: INFO
    propagate: false

  kubeheal:
    handlers: [console, file, error_file]
    level: DEBUG
    propagate: false

root:
  handlers: [console, file]
  level: INFO
