project:
  name: KubeHeal AI
  version: 1.0.0
  description: Self-healing Kubernetes system with AI-powered diagnostics

api:
  host: 0.0.0.0
  port: 8000
  workers: 4
  log_level: info
  cors_origins:
    - http://localhost:8501
    - http://localhost:3000

database:
  mongodb:
    uri: mongodb://localhost:27017
    database: kubeheal
    collections:
      - pods
      - nodes
      - events
      - alerts
      - metrics
      - predictions
      - logs
      - incidents
      - knowledge_base
  redis:
    host: localhost
    port: 6379
    db: 0

kubernetes:
  in_cluster: false
  kubeconfig: ~/.kube/config
  namespace: default
  watch_interval: 10

monitoring:
  prometheus:
    url: http://localhost:9090
    scrape_interval: 15s
  grafana:
    url: http://localhost:3000
    dashboard_uid: kubeheal

ml:
  models_dir: artifacts/models
  batch_size: 32
  random_state: 42
  test_size: 0.2
  threshold_anomaly: 0.75

rag:
  embedding_model: sentence-transformers/all-MiniLM-L6-v2
  llm_model: mistralai/Mistral-7B-Instruct-v0.2
  vector_store: chroma
  chunk_size: 512
  chunk_overlap: 64
  top_k: 5
  collection_name: kubeheal_knowledge

logging:
  version: 1
  formatters:
    default:
      format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  handlers:
    console:
      class: logging.StreamHandler
      level: INFO
      formatter: default
    file:
      class: logging.handlers.RotatingFileHandler
      level: INFO
      formatter: default
      filename: logs/kubeheal.log
      maxBytes: 10485760
      backupCount: 5
